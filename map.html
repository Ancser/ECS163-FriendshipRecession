<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Global Loneliness Atlas</title>
    <link rel="stylesheet" href="map_style.css">
</head>
<body>
    <div id="main">

        <!-- MAP -->
        <div id="map-wrap">
            <div id="map"></div>

            <!-- Floating controls -->
            <div id="bottom-controls">
                <div class="btn-group">
                    <button class="mode-btn active" data-mode="loneliness">Loneliness</button>
                    <button class="mode-btn"        data-mode="connected">Social Connection</button>
                    <button class="mode-btn"        data-mode="policies">Policies</button>
                </div>
                <div id="legend">
                    <span id="legend-lo"></span>
                    <div id="legend-grad"></div>
                    <span id="legend-hi"></span>
                    <span id="legend-label"></span>
                </div>
            </div>

            <!-- Hover tooltip -->
            <div id="tooltip">
                <div id="tt-name"></div>
                <div id="tt-val"></div>
                <div class="tt-hint">Click for details</div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div id="sidebar-inner">
                <div id="sb-header">
                    <div id="sb-country"></div>
                    <button id="sb-close">✕</button>
                </div>
                <div id="sb-content"></div>

                <!-- Policy detail (slides over sidebar content) -->
                <div class="detail-overlay" id="policy-detail">
                    <div class="detail-header">
                        <button class="detail-back" id="pd-back">← Back</button>
                        <div class="detail-title" id="pd-title"></div>
                    </div>
                    <div class="detail-body" id="pd-body"></div>
                </div>

                <!-- Gender breakdown (slides over sidebar content) -->
                <div class="detail-overlay" id="gender-detail">
                    <div class="detail-header">
                        <button class="detail-back" id="gd-back">← Back</button>
                        <div class="detail-title" id="gd-title"></div>
                    </div>
                    <div class="detail-body" id="gd-body"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <script src="map.js"></script>
</body>
</html>
