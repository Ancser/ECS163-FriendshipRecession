<!DOCTYPE html>
<html lang="en" style="width:100%;height:100%;">
<head>
    <meta charset="utf-8">
    <title>Global Loneliness Atlas</title>
    <link rel="stylesheet" href="map_style.css">
</head>
<body>
    <div id="app">

        <!-- MAP AREA -->
        <div id="main">
            <!-- MAP -->
            <div id="map-wrap">
                <div id="map"></div>

                <!-- BOTTOM CONTROLS — fixed over the map -->
                <div id="bottom-controls">
                    <div class="btn-group">
                        <button id="btn-lone"    class="mode-btn active" data-mode="loneliness">Loneliness</button>
                        <button id="btn-conn"    class="mode-btn"        data-mode="connected">Social Connection</button>
                        <button id="btn-policy" class="mode-btn"        data-mode="policies">Policies</button>
                    </div>
                    <div id="legend">
                        <span id="legend-lo">Low</span>
                        <div id="legend-grad" class="legend-grad"></div>
                        <span id="legend-hi">High</span>
                        <span id="legend-label"></span>
                    </div>
                </div>

                <div id="tooltip">
                    <div class="tt-name" id="tt-name"></div>
                    <div class="tt-val"  id="tt-val"></div>
                    <div class="tt-hint">Click for details</div>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div id="sidebar">
                <div id="sidebar-inner">
                    <div id="sb-header">
                        <div id="sb-country">Country</div>
                        <button id="sb-close">✕</button>
                    </div>
                    <div id="sb-content"></div>

                    <!-- POLICY DETAILS (w/ sidebar) -->
                    <div id="policy-detail">
                        <div id="pd-header">
                            <button id="pd-back">← Back</button>
                            <div id="pd-title"></div>
                        </div>
                        <div id="pd-body"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- d3 and script imports -->
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <script src="map.js"></script>
</body>
</html>
